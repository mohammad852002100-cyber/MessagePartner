<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
<!-- تدرج ذهبي أكثر دفئاً وانسجاماً -->
<linearGradient id="harmonious-gold" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#F2D06B" /> <!-- ذهبي فاتح كريمي -->
<stop offset="30%" style="stop-color:#EBC55B" />
<stop offset="60%" style="stop-color:#DDAF46" /> <!-- ذهبي متوسط -->
<stop offset="100%" style="stop-color:#C99B35" /> <!-- ذهبي دافئ غامق -->
</linearGradient>

<!-- تدرج وجه البوصلة بألوان ترابية دافئة -->
<radialGradient id="harmonious-glass" cx="50%" cy="50%" r="50%">
  <stop offset="0%" style="stop-color:#FFFBE8" /> <!-- أبيض كريمي -->
  <stop offset="70%" style="stop-color:#F7EED6" /> <!-- بيج فاتح -->
  <stop offset="100%" style="stop-color:#EBE0C5" /> <!-- بيج دافئ -->
</radialGradient>

<!-- تدرجات الإبرة الحمراء الدافئة -->
<linearGradient id="harmonious-red-light" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" style="stop-color:#E85D5D" /> <!-- أحمر دافئ فاتح -->
  <stop offset="100%" style="stop-color:#D94D4D" />
</linearGradient>
<linearGradient id="harmonious-red-dark" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" style="stop-color:#C44141" /> <!-- أحمر دافئ غامق -->
  <stop offset="100%" style="stop-color:#AB3535" />
</linearGradient>

<!-- تدرجات الإبرة الرمادية الدافئة -->
<linearGradient id="harmonious-grey-light" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" style="stop-color:#8C8C8C" /> <!-- رمادي دافئ فاتح -->
  <stop offset="100%" style="stop-color:#7D7D7D" />
</linearGradient>
<linearGradient id="harmonious-grey-dark" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" style="stop-color:#5E5E5E" /> <!-- رمادي دافئ غامق -->
  <stop offset="100%" style="stop-color:#4F4F4F" />
</linearGradient>

<!-- فلتر الظل الناعم -->
<filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" />
  <feOffset dx="0.4" dy="1.2" result="offsetblur" />
  <feComponentTransfer>
    <feFuncA type="linear" slope="0.25" />
  </feComponentTransfer>
  <feMerge>
    <feMergeNode />
    <feMergeNode in="SourceGraphic" />
  </feMerge>
</filter>

</defs>

<!-- الحلقة العلوية الصغيرة -->
<circle cx="78" cy="18" r="7" fill="none" stroke="url(#harmonious-gold)" stroke-width="3.5" />

<!-- الإطار الذهبي الرئيسي -->
<g filter="url(#soft-shadow)">
<circle cx="50" cy="55" r="42" fill="url(#harmonious-gold)" />
<!-- الحافة الداخلية للإطار (العمق) بلون متناغم -->
<circle cx="50" cy="55" r="38" fill="#DDAF46" opacity="0.25" />
<!-- وجه البوصلة -->
<circle cx="50" cy="55" r="35" fill="url(#harmonious-glass)" />
</g>

<!-- خطوط الاتجاهات بلون رمادي دافئ -->
<g stroke="#9E9E9E" stroke-width="0.5" opacity="0.5">
<line x1="50" y1="26" x2="50" y2="84" />
<line x1="21" y1="55" x2="79" y2="55" />
<line x1="29.5" y1="34.5" x2="70.5" y2="75.5" />
<line x1="70.5" y1="34.5" x2="29.5" y2="75.5" />
</g>

<!-- إبرة البوصلة 3D -->
<g filter="url(#soft-shadow)">
<!-- الشمال (الأحمر الدافئ) -->
<path d="M50 30 L57 55 L50 53 Z" fill="url(#harmonious-red-light)" />
<path d="M50 30 L43 55 L50 53 Z" fill="url(#harmonious-red-dark)" />
<!-- الجنوب (الرمادي الدافئ) -->
<path d="M50 80 L57 55 L50 57 Z" fill="url(#harmonious-grey-light)" />
<path d="M50 80 L43 55 L50 57 Z" fill="url(#harmonious-grey-dark)" />
</g>

<!-- المسمار المركزي بلون متناغم -->
<circle cx="50" cy="55" r="3.5" fill="#A6A6A6" />
<circle cx="48.5" cy="53.5" r="1.2" fill="#FFF" opacity="0.7" />
</svg>
